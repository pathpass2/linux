name: Build rk3566-tspi.img

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ARCH: arm64


jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # 关键：保留文件权限
          persist-credentials: false

      - name: Fix Script Permissions
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;
          find . -type f -name "mkimg" -exec chmod +x {} \;
          find . -type f -name "resource_tool" -exec chmod +x {} \;
          find . -type f -name "mkbootimg" -exec chmod +x {} \;
          chmod +x ./scripts/*
          
      

      - name: Install Latest LZ4
        run: |
          # 从 GitHub 下载最新版 LZ4
          LZ4_LATEST=$(curl -s https://api.github.com/repos/lz4/lz4/releases/latest | grep 'tarball_url' | cut -d\" -f4)
          wget $LZ4_LATEST -O lz4-latest.tar.gz
          tar -xzf lz4-latest.tar.gz
          cd lz4-lz4-*
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          lz4 --version

          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            device-tree-compiler \
            u-boot-tools \
            libssl-dev \
            bc \
            flex \
            bison \
            libncurses-dev
          sudo -E apt-get -y install $(curl -fsSL https://tinyurl.com/ubuntu2204-build-armbian)

      - name: Setup ARM Toolchain
        run: |
          wget https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          tar xf arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          echo "$(pwd)/arm-gnu-toolchain-14.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> $GITHUB_PATH



      - name: Build Kernel
        run: |        
          # 获取内核版本号
          echo "kernel_main_version=$(make kernelversion)" >> $GITHUB_ENV
          make ARCH=$ARCH CROSS_COMPILE=aarch64-none-linux-gnu-  olddefconfig
          make ARCH=$ARCH CROSS_COMPILE=aarch64-none-linux-gnu-  rk3566-lckfb-tspi.img  -j$(nproc)
          mv boot.img  rk3566-lckfb-tspi-boot-${{ env.kernel_main_version }}.img
          make ARCH=$ARCH CROSS_COMPILE=aarch64-none-linux-gnu-  modules_install  INSTALL_MOD_PATH=./modules
          # 打包模块
          tar -zcvf ${{ env.kernel_main_version }}.tar.gz   ./modules/lib/modules/${{ env.kernel_main_version }}

      - name: Build Kernel-headers
        run: |
          # 制作linux-headers头文件
          mkdir  linux-headers-${{ env.kernel_main_version }}
          cp -a  Module.symvers      linux-headers-${{ env.kernel_main_version }}/
          cp -a  Makefile           linux-headers-${{ env.kernel_main_version }}/
          cp -a  scripts            linux-headers-${{ env.kernel_main_version }}/
          mkdir -p           linux-headers-${{ env.kernel_main_version }}/arch/arm64
          cp -a arch/arm64/include    linux-headers-${{ env.kernel_main_version }}/arch/arm64/include
          cp -a arch/arm64/kvm          linux-headers-${{ env.kernel_main_version }}/arch/arm64/kvm 
          cp -a arch/arm64/Makefile      linux-headers-${{ env.kernel_main_version }}/arch/arm64/Makefile
          cp -a include                  linux-headers-${{ env.kernel_main_version }}/
          cp -a .config                 linux-headers-${{ env.kernel_main_version }}/
          tar -zcvf  linux-headers-${{ env.kernel_main_version }}.tar.gz   linux-headers-${{ env.kernel_main_version }}

          
      - name: Upload Kernel to Release
        uses: ncipollo/release-action@main
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./rk3566-lckfb-tspi-boot-${{ env.kernel_main_version }}.img
            ./modules/lib/modules/${{ env.kernel_main_version }}.tar.gz
            ./linux-headers-${{ env.kernel_main_version }}.tar.gz
          body: "Auto-built  rk3566-lckfb-tspi-boot-${{ env.kernel_main_version }}"
          draft: false
          prerelease: false
